<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8 flex gap-6 h-screen overflow-hidden">
    <div class="w-2/3">
        <h1 class="text-3xl font-bold mb-6">ระบบสั่งเครื่องดื่ม</h1>
        <div id="menu-list" class="grid grid-cols-3 gap-4 overflow-auto pb-10"></div>
    </div>
    <div class="w-1/3 bg-white p-6 shadow-xl rounded-2xl flex flex-col h-full">
        <h2 class="text-2xl font-bold mb-4 border-b pb-2">ตะกร้าสินค้า</h2>
        <div id="cart-list" class="flex-1 overflow-auto"></div>
    </div>

    <div id="option-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl w-96 shadow-2xl">
            <h2 id="modal-menu-name" class="text-2xl font-bold mb-4">...</h2>
            <select id="modal-size" class="w-full p-3 border rounded-xl mb-4 text-lg">
                <option value="M" selected>ไซส์ M</option>
                <option value="L">ไซส์ L (+10฿)</option>
            </select>
            <div id="modal-toppings" class="space-y-2 mb-6 border p-4 rounded-xl bg-gray-50"></div>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">ยกเลิก</button>
                <button onclick="confirmAddToCart()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">ยืนยัน</button>
            </div>
        </div>
    </div>
     
    <script src="pos.js"></script>
</body>

</html>
